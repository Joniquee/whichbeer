<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>whichbeer</title>
<style>
  :root {
    --amber: #e8a33d;
    --amber-dark: #c97f1f;
    --cream: #fbf2e5;
    --card: #ffffff;
    --ink: #2e1b0f;
    --ink-soft: #7a6a5c;
    --border: #e7d9c4;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--cream);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }

  .app {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* --- Logo --- */
  .logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }

  .logo svg {
    width: 96px;
    height: 112px;
  }

  .logo-text {
    margin-top: 6px;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: var(--ink);
  }

  .logo-text span {
    color: #2e1b0f;
  }

  /* --- Search bar --- */
  .search-bar {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 18px;
    box-shadow: 0 3px 0 var(--ink);
  }

  .search-bar svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--ink-soft);
  }

  .search-bar input {
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px;
    width: 100%;
    color: var(--ink);
    font-family: inherit;
  }

  .search-bar input::placeholder {
    color: var(--ink-soft);
  }

  .back-btn {
    display: none;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    padding: 0;
    background: none;
    border: none;
    color: var(--ink-soft);
    cursor: pointer;
  }

  .back-btn.visible {
    display: flex;
  }

  .back-btn:hover {
    color: var(--ink);
  }

  .back-btn svg {
    width: 20px;
    height: 20px;
  }

  /* --- Beer list card --- */
  .list-card {
    width: 100%;
    background: var(--card);
    border: 2px solid transparent;
    border-radius: 18px;
    box-shadow: none;
    overflow: hidden;
    display: flex;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.3s ease, opacity 0.25s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .list-card.open {
    border-color: var(--ink);
    box-shadow: 0 4px 0 var(--ink);
    max-height: 480px;
    opacity: 1;
  }

  .beer-list {
    flex: 1;
    max-height: 480px;
    overflow-y: scroll;
    padding: 6px 4px 6px 6px;

    /* custom scrollbar to mimic the hand-drawn slider */
    scrollbar-width: thick;
    scrollbar-color: var(--amber) transparent;
  }

  .beer-list::-webkit-scrollbar {
    width: 14px;
  }

  .beer-list::-webkit-scrollbar-track {
    background: transparent;
    margin: 10px 0;
  }

  .beer-list::-webkit-scrollbar-thumb {
    background: var(--amber);
    border-radius: 20px;
    border: 3px solid var(--card);
  }

  .beer-list::-webkit-scrollbar-thumb:hover {
    background: var(--amber-dark);
  }

  .beer-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .beer-item:last-child {
    border-bottom: none;
  }

  .beer-item:hover {
    background: #fbf1e0;
  }

  .beer-thumb {
    width: 44px;
    height: 44px;
    flex-shrink: 0;
    border-radius: 10px;
    border: 2px solid var(--ink);
    background: repeating-linear-gradient(
      45deg,
      #f3e6cf,
      #f3e6cf 6px,
      #ecdcbf 6px,
      #ecdcbf 12px
    );
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .beer-thumb svg {
    width: 22px;
    height: 22px;
    color: var(--amber-dark);
    opacity: 0.7;
  }

  .beer-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
  }

  .beer-name {
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
  }

  .beer-empty {
    padding: 24px 12px;
    text-align: center;
    color: var(--ink-soft);
    font-size: 15px;
  }

  /* --- Primary buttons (continue / get probability) --- */
  .primary-btn {
    display: none;
    width: 100%;
    margin-top: 18px;
    padding: 14px;
    border: 2px solid var(--ink);
    border-radius: 16px;
    background: var(--amber);
    color: var(--ink);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    transition: background 0.15s ease, transform 0.1s ease, box-shadow 0.1s ease;
  }

  .primary-btn.visible {
    display: block;
  }

  .primary-btn:hover {
    background: var(--amber-dark);
  }

  .primary-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--ink);
  }

  .primary-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .primary-btn:disabled:hover {
    background: var(--amber);
  }

  .primary-btn:disabled:active {
    transform: none;
    box-shadow: 0 3px 0 var(--ink);
  }

  /* --- Beer detail card (final state) --- */
  .beer-detail-card {
    display: none;
    width: 100%;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 2px solid var(--ink);
    border-radius: 18px;
    box-shadow: 0 4px 0 var(--ink);
    padding: 28px 20px;
  }

  .beer-detail-card.visible {
    display: flex;
  }

  .beer-detail-image {
    width: 96px;
    height: 96px;
    border-radius: 14px;
    border: 2px solid var(--ink);
    object-fit: cover;
    background: repeating-linear-gradient(
      45deg,
      #f3e6cf,
      #f3e6cf 6px,
      #ecdcbf 6px,
      #ecdcbf 12px
    );
    margin-bottom: 10px;
  }

  .beer-detail-name {
    font-size: 20px;
    font-weight: 800;
    text-align: center;
  }

  .beer-detail-brewery {
    font-size: 15px;
    color: var(--ink-soft);
    text-align: center;
  }

  .beer-detail-stats {
    display: flex;
    gap: 20px;
    margin-top: 14px;
    font-size: 14px;
    color: var(--ink-soft);
  }

  .beer-detail-stats strong {
    color: var(--ink);
  }

  .beer-detail-description {
    width: 100%;
    max-height: 130px;
    margin: 16px 0 0;
    padding-right: 10px;
    overflow-y: scroll;

    /* custom scrollbar, same amber "slider" as the search results list */
    scrollbar-width: thick;
    scrollbar-color: var(--amber) transparent;
  }

  .beer-detail-description::-webkit-scrollbar {
    width: 10px;
  }

  .beer-detail-description::-webkit-scrollbar-track {
    background: transparent;
    margin: 6px 0;
  }

  .beer-detail-description::-webkit-scrollbar-thumb {
    background: var(--amber);
    border-radius: 20px;
    border: 2px solid var(--card);
  }

  .beer-detail-description::-webkit-scrollbar-thumb:hover {
    background: var(--amber-dark);
  }

  .beer-detail-description p {
    margin: 0;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink-soft);
    text-align: left;
    white-space: pre-line;
  }

  /* --- Toast --- */
  .toast {
    position: fixed;
    left: 50%;
    bottom: 32px;
    transform: translate(-50%, 16px);
    background: var(--ink);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    max-width: 90vw;
    text-align: center;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease, transform 0.25s ease;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }

  /* --- Probability fill (beer rising from the bottom of the screen) --- */
  .probability-overlay {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .probability-overlay.visible {
    opacity: 1;
  }

  .probability-fill {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 0%;
    /* matches the flat color at the bottom of assets/foam.png, so the
       photo's foam band blends into this solid fill with no visible seam */
    background-color: #f8a204;
    transition: height 1.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .probability-fill::before {
    content: "";
    position: absolute;
    /* Tile the image at a small fixed size (preserving its aspect ratio)
       instead of stretching/cropping it to the viewport width — this way
       every tile always shows the whole picture, foam fading down to its
       own flat-color bottom, never cut mid-texture. The box is taller than
       one tile, so the strip below each tile is transparent and shows the
       matching solid fill color underneath — no seam. */
    top: -110px;
    left: 0;
    right: 0;
    height: 145px;
    background-image: url('assets/foam.png');
    background-size: 220px auto;
    background-position: top left;
    background-repeat: repeat-x;
  }

  .probability-readout {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    margin-top: 6px;
    opacity: 0;
    transform: translateY(-8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .probability-readout.visible {
    display: flex;
    opacity: 1;
    transform: translateY(0);
  }

  .probability-number {
    background: var(--cream);
    border: 2px solid var(--ink);
    border-radius: 20px;
    padding: 10px 24px;
    font-size: 32px;
    font-weight: 800;
    color: var(--ink);
    box-shadow: 0 4px 0 var(--ink);
  }

  .probability-restart {
    border: 2px solid var(--ink);
    border-radius: 14px;
    background: var(--card);
    color: var(--ink);
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    padding: 10px 18px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
  }

  .probability-restart:hover {
    background: #fbf1e0;
  }

  .probability-restart:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--ink);
  }
</style>
</head>
<body>

  <div class="app">

    <div class="logo">
      <svg viewBox="0 0 100 130" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- question-mark handle, attached to the top of the mug -->
        <path d="M62 44c-2-12 8-22 20-20 11 2 17 13 11 22-4 6-12 8-15 15-1 3-1 6-1 9"
              fill="none" stroke="#2e1b0f" stroke-width="4" stroke-linecap="round"/>
        <circle cx="76" cy="80" r="4.5" fill="#2e1b0f"/>
        <!-- foam -->
        <path d="M20 42c-2-6 4-11 10-9 1-7 12-9 15-2 4-6 14-3 13 5 6-2 11 5 7 10-3 2-7 3-11 3H26c-4 0-8-2-6-7z"
              fill="#fff" stroke="#2e1b0f" stroke-width="3" stroke-linejoin="round"/>
        <!-- mug body -->
        <rect x="24" y="50" width="46" height="58" rx="6"
              fill="#f3c969" stroke="#2e1b0f" stroke-width="3"/>
        <line x1="24" y1="66" x2="70" y2="66" stroke="#2e1b0f" stroke-width="2" opacity="0.5"/>
      </svg>
      <div class="logo-text">which<span>beer</span></div>
    </div>

    <div class="search-bar">
      <button class="back-btn" id="backBtn" type="button" aria-label="Назад">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5"/>
          <path d="M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" placeholder="Что желаете?" />
    </div>

    <div class="list-card">
      <div class="beer-list" id="beerList">
        <!-- placeholder rows, purely for layout/design -->
      </div>
    </div>

    <button class="primary-btn" id="continueBtn" type="button">Давай ближе к делу...</button>

    <div class="beer-detail-card" id="beerDetail">
      <img class="beer-detail-image" id="beerDetailImage" alt="" />
      <div class="beer-detail-name" id="beerDetailName"></div>
      <div class="beer-detail-brewery" id="beerDetailBrewery"></div>
      <div class="beer-detail-stats">
        <span>Стиль: <strong id="beerDetailStyle"></strong></span>
        <span>ABV: <strong id="beerDetailAbv"></strong></span>
        <span>IBU: <strong id="beerDetailIbu"></strong></span>
      </div>
      <div class="beer-detail-description" id="beerDetailDescription">
        <p id="beerDetailDescriptionText"></p>
      </div>
      <button class="primary-btn visible" id="probabilityBtn" type="button">Так, ну и что?</button>

      <div class="probability-readout" id="probabilityReadout">
        <div class="probability-number" id="probabilityNumber"></div>
        <button class="probability-restart" id="restartBtn" type="button">Хочу еще пива</button>
      </div>
    </div>

  </div>

  <div class="probability-overlay" id="probabilityOverlay">
    <div class="probability-fill" id="probabilityFill"></div>
  </div>

  <script>
    const API_BASE = "http://localhost:8000";

    const list = document.getElementById("beerList");
    const searchInput = document.querySelector(".search-bar input");
    const listCard = document.querySelector(".list-card");
    const backBtn = document.getElementById("backBtn");
    const DEFAULT_PLACEHOLDER = searchInput.placeholder;
    const continueBtn = document.getElementById("continueBtn");
    const beerDetail = document.getElementById("beerDetail");
    const probabilityBtn = document.getElementById("probabilityBtn");
    const probabilityOverlay = document.getElementById("probabilityOverlay");
    const probabilityFill = document.getElementById("probabilityFill");
    const probabilityReadout = document.getElementById("probabilityReadout");
    const probabilityNumber = document.getElementById("probabilityNumber");
    const restartBtn = document.getElementById("restartBtn");

    const BEER_ICON = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 8h12v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V8z"/>
        <path d="M16 10h2a2 2 0 0 1 0 4h-2"/>
        <path d="M4 8l1-4h10l1 4"/>
      </svg>
    `;

    function beerImgFallback(img) {
      const wrapper = document.createElement("div");
      wrapper.innerHTML = BEER_ICON;
      img.replaceWith(wrapper.firstElementChild);
    }
    window.beerImgFallback = beerImgFallback;

    function showToast(message) {
      const toast = document.createElement("div");
      toast.className = "toast";
      toast.textContent = message;
      document.body.appendChild(toast);

      requestAnimationFrame(() => toast.classList.add("show"));

      setTimeout(() => {
        toast.classList.remove("show");
        toast.addEventListener("transitionend", () => toast.remove(), { once: true });
      }, 2000);
    }

    async function addBeerToDb(beer) {
      try {
        await fetch(`${API_BASE}/api/add_beer`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            brewery: beer.brewery_name,
            name: beer.beer_name,
            style: beer.type_name,
            abv: beer.beer_abv,
            ibu: beer.beer_ibu,
            description: "",
          }),
        });
      } catch (err) {
        console.error(err);
      }
    }

    // First beer picked is the recommendation seed; every pick after that
    // is added to the comparison set.
    let recommendationBeer = null;
    const comparisonBeers = [];

    function selectBeer(beer) {
      if (!recommendationBeer) {
        recommendationBeer = beer;
        showToast(`Добавлено для рекомендации: ${beer.beer_name}`);
        searchInput.placeholder = "С чем будем сравнивать?";
        backBtn.classList.add("visible");
        continueBtn.classList.add("visible");
        continueBtn.disabled = true;
      } else {
        comparisonBeers.push(beer);
        showToast(`Добавлено для сравнения: ${beer.beer_name}`);
        continueBtn.disabled = false;
      }

      addBeerToDb(beer);

      searchInput.value = "";
      listCard.classList.remove("open");
      list.innerHTML = "";
    }

    // Goes back to the initial "pick a beer to get recommendations for"
    // state — only resets local selection state, the database is untouched.
    function resetSelection() {
      recommendationBeer = null;
      comparisonBeers.length = 0;
      searchInput.placeholder = DEFAULT_PLACEHOLDER;
      backBtn.classList.remove("visible");
      continueBtn.classList.remove("visible");
      continueBtn.disabled = true;
      searchInput.value = "";
      listCard.classList.remove("open");
      list.innerHTML = "";
    }

    backBtn.addEventListener("click", resetSelection);

    function renderBeerDetail(beer) {
      const img = document.getElementById("beerDetailImage");
      if (beer.beer_label) {
        img.src = beer.beer_label;
        img.style.display = "";
        img.onerror = () => { img.style.display = "none"; };
      } else {
        img.style.display = "none";
      }

      document.getElementById("beerDetailName").textContent = beer.beer_name;
      document.getElementById("beerDetailBrewery").textContent = beer.brewery_name;
      document.getElementById("beerDetailStyle").textContent = beer.type_name ?? "—";
      document.getElementById("beerDetailAbv").textContent =
        beer.beer_abv != null ? `${beer.beer_abv}%` : "—";
      document.getElementById("beerDetailIbu").textContent =
        beer.beer_ibu != null ? beer.beer_ibu : "—";

      const descriptionText = document.getElementById("beerDetailDescriptionText");
      document.getElementById("beerDetailDescription").scrollTop = 0;
      descriptionText.textContent = "Загружаем описание...";
      fetch(`${API_BASE}/api/beer_description?beer_name=${encodeURIComponent(beer.beer_name)}`)
        .then((res) => res.json())
        .then((data) => {
          descriptionText.textContent = data.description || "Описание пока недоступно";
        })
        .catch((err) => {
          console.error(err);
          descriptionText.textContent = "Описание пока недоступно";
        });
    }

    // Locks in the comparison set gathered in the previous step and moves
    // on to the final screen showing the beer the user wants to try.
    function goToBeerDetail() {
      document.querySelector(".search-bar").style.display = "none";
      listCard.classList.remove("open");
      backBtn.classList.remove("visible");
      continueBtn.classList.remove("visible");

      renderBeerDetail(recommendationBeer);
      beerDetail.classList.add("visible");
    }

    continueBtn.addEventListener("click", goToBeerDetail);

    // Fills the background with "beer" from the bottom up: 0% is empty,
    // 100% reaches the top of the screen. Expects a 0-100 number.
    function showProbability(probability) {
      const pct = Math.max(0, Math.min(100, probability));
      probabilityOverlay.classList.add("visible");
      probabilityFill.style.height = `${pct}%`;
      probabilityNumber.textContent = `${Math.round(pct)}%`;
      probabilityBtn.classList.remove("visible");
      probabilityReadout.classList.add("visible");
    }

    // Full reset: collapses the beer fill, hides the result and detail
    // card, brings back the search bar, and clears the selection state.
    function restartAll() {
      probabilityOverlay.classList.remove("visible");
      probabilityFill.style.height = "0%";
      probabilityReadout.classList.remove("visible");
      probabilityBtn.classList.add("visible");
      beerDetail.classList.remove("visible");
      document.querySelector(".search-bar").style.display = "";
      resetSelection();
    }

    restartBtn.addEventListener("click", restartAll);

    probabilityBtn.addEventListener("click", async () => {
      try {
        const res = await fetch(`${API_BASE}/api/probability`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            beer_name: recommendationBeer.beer_name,
            comparisons: comparisonBeers.map((b) => b.beer_name),
          }),
        });
        if (!res.ok) throw new Error(`probability failed: ${res.status}`);
        const data = await res.json();
        showProbability(data.probability);
      } catch (err) {
        console.error(err);
        showToast("Эндпоинт вероятности пока не подключён");
      }
    });

    function renderBeers(beers) {
      list.innerHTML = "";

      if (!beers.length) {
        const empty = document.createElement("div");
        empty.className = "beer-empty";
        empty.textContent = "Ничего не нашлось";
        list.appendChild(empty);
        return;
      }

      beers.forEach((beer) => {
        const item = document.createElement("div");
        item.className = "beer-item";
        const thumb = beer.beer_label
          ? `<img src="${beer.beer_label}" alt="" loading="lazy" onerror="beerImgFallback(this)">`
          : BEER_ICON;
        item.innerHTML = `
          <div class="beer-thumb">${thumb}</div>
          <div class="beer-name">${beer.brewery_name} — ${beer.beer_name}</div>
        `;
        item.addEventListener("click", () => selectBeer(beer));
        list.appendChild(item);
      });
    }

    async function searchBeers(query) {
      const url = `${API_BASE}/api/search_beers?beer_name=${encodeURIComponent(query)}`;
      const res = await fetch(url);
      if (!res.ok) {
        throw new Error(`search_beers failed: ${res.status}`);
      }
      const data = await res.json();
      return data.beers ?? [];
    }

    let debounceTimer;
    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim();
      listCard.classList.toggle("open", query.length > 0);

      clearTimeout(debounceTimer);
      if (!query) {
        list.innerHTML = "";
        return;
      }

      debounceTimer = setTimeout(async () => {
        try {
          const beers = await searchBeers(query);
          renderBeers(beers);
        } catch (err) {
          console.error(err);
        }
      }, 250);
    });
  </script>
